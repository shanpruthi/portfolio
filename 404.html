const { useState, useEffect, useLayoutEffect, useCallback } = React;

function routeFromPath() {
  let path = window.location.pathname.replace(/\/$/, '');
  if (path.endsWith('/index.html')) path = path.slice(0, -'/index.html'.length);
  if (path.endsWith('/projects')) return 'projects';
  return 'about';
}

function routeFromHash() {
  const hash = window.location.hash;
  if (!hash || hash === '#') return null;
  const h = hash.slice(1).replace(/^\//, '').split('?')[0];
  if (h === '' || h === 'about') return 'about';
  if (h === 'projects') return 'projects';
  if (h === 'notes') return 'about';
  return null;
}

function routeFromLocation() {
  const fromHash = routeFromHash();
  if (fromHash !== null) return fromHash;
  return routeFromPath();
}

function hrefForRoute(route) {
  return '#/' + route;
}

function titleForRoute(route) {
  const t = 'Shan Pruthi';
  if (route === 'projects') return t + ' · Projects';
  return t;
}

  customTitle: true,
  image: 'assets/yelp-rfq.png'
},
{
  id: 'uwpm', year: '2016-2020', title: 'UW Product Management', tag: 'Personal',
  detail: `Organized workshops, conferences, and ${inlineLink('https://open.spotify.com/show/4bjMhUJIKYlAl0nCjQCqGv?si=213e823f9b9d4e9b', 'content hubs')} for people to learn about product. Excited about the next generation of Waterloo kids.`,
  link: 'https://uwpm.substack.com/', linkLabel: '',
  customTitle: true,
  image: 'assets/uwpm.jpg'
}];

/** Same link order as the body paragraph: titled link → first &lt;a&gt; in detail → trailing linkLabel link. */
function firstHyperlinkInProjectBody(item) {
  if (item.link && (item.id === 'search' || item.customTitle)) {
    return item.link;
  }
  const hrefMatch = item.detail.match(/<a\s+[^>]*\bhref\s*=\s*(["'])([^"']+)\1/i);
  if (hrefMatch) return hrefMatch[2];
  if (item.link && item.linkLabel && item.id !== 'search' && !item.customTitle) {
    return item.link;
  }
  return null;
}

function ItemRow({ item }) {
  const mediaHref = firstHyperlinkInProjectBody(item);
  const mediaInner = (inner) =>
    mediaHref ?
      <a
        href={mediaHref}
        target="_blank"
        rel="noopener noreferrer"
        className="project-card-media-link"
        aria-label={'Open link for ' + item.title}
      >
        {inner}
      </a> :

    inner;

  return (
    <article className="project-card">
      {item.image &&
      <div className="project-card-media">
        {mediaInner(<img src={item.image} alt={mediaHref ? '' : item.title} />)}
      </div>
      }
      {!item.image && item.imagePlaceholder &&
      <div
        className="project-card-media"
        style={{
          background: item.imagePlaceholder,
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center'
        }}
      >
        {mediaHref ?
          <a
            href={mediaHref}
            target="_blank"
            rel="noopener noreferrer"
            className="project-card-media-link"
            style={{ display: 'flex', width: '100%', height: '100%', alignItems: 'center', justifyContent: 'center' }}
            aria-label={'Open link for ' + item.title}
          >
            <span className="project-placeholder-label">Image</span>
          </a> :

          <span className="project-placeholder-label">Image</span>
        }
      </div>
      }
      {item.year &&
      <p className="project-meta">
        {item.year}
        {item.tag && <><span style={{ margin: '0 8px' }}>·</span>{item.tag}</>}
      </p>
      }
      <div className="project-card-body">
        <h3 className="project-card-title">
          {item.link && (item.id === 'search' || item.customTitle) ?
            <a href={item.link} target="_blank" rel="noopener noreferrer">
              {item.title}
            </a> :

            item.title
          }
        </h3>
        <p className="project-card-desc">
          <span dangerouslySetInnerHTML={{ __html: item.detail }} />
          {item.link && item.linkLabel && item.id !== 'search' && !item.customTitle &&
            <>
              {' '}
              <a href={item.link} target="_blank" rel="noopener noreferrer">
                {item.linkLabel}
              </a>
            </>
          }
        </p>
      </div>
    </article>);

}

const WORK_FILTER_OPTIONS = [
{ id: 'all', label: 'All' },
{ id: 'work', label: 'Work' },
{ id: 'personal', label: 'Personal' }];

function WorkSection() {
  const [workFilter, setWorkFilter] = useState('all');
  const [narrowViewport, setNarrowViewport] = useState(
    () => typeof window !== 'undefined' && window.matchMedia('(max-width: 720px)').matches
  );

  useEffect(() => {
    const mq = window.matchMedia('(max-width: 720px)');
    function sync() {
      setNarrowViewport(mq.matches);
    }
    sync();
    mq.addEventListener('change', sync);
    return () => mq.removeEventListener('change', sync);
  }, []);

  const filteredItems = ITEMS.filter((item) => {
    if (workFilter === 'all') return true;
    if (workFilter === 'work') return item.tag === 'Work';
    if (workFilter === 'personal') return item.tag === 'Personal';
    return true;
  });

  const leftItems = filteredItems.filter((_, i) => i % 2 === 0);
  const rightItems = filteredItems.filter((_, i) => i % 2 === 1);

  return (
    <section id="projects" className="main-content" style={{ padding: '0 0 80px', scrollMarginTop: '32px' }}>
      <h2 style={PAGE_HEADLINE_STYLE}>Projects</h2>
      <div
        role="group"
        aria-label="Filter projects by category"
        style={{ display: 'flex', flexWrap: 'wrap', gap: '8px', marginBottom: '24px' }}
      >
        {WORK_FILTER_OPTIONS.map(({ id, label }) => {
          const active = workFilter === id;
          return (
            <button
              key={id}
              type="button"
              className="work-filter-btn"
              aria-pressed={active}
              onClick={() => setWorkFilter(id)}
            >
              {label}
            </button>
          );
        })}
      </div>
      {narrowViewport ?
        <div className="projects-stack">
          {filteredItems.map((item) => <ItemRow key={item.id} item={item} />)}
        </div> :

        <div className="projects-grid">
          <div className="projects-grid-col">
            {leftItems.map((item) => <ItemRow key={item.id} item={item} />)}
          </div>
          <div className="projects-grid-col">
            {rightItems.map((item) => <ItemRow key={item.id} item={item} />)}
          </div>
        </div>
      }
    </section>);

}

/* ─── Theme toggle ─── */
function ThemeIconSun() {
  return (
    <svg className="theme-toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3.5" />
      <path d="M12 2v2 M12 20v2 M4.2 4.2l1.4 1.4 M18.4 18.4l1.4 1.4 M2 12h2 M20 12h2 M4.2 19.8l1.4-1.4 M18.4 5.6l1.4-1.4" />
    </svg>);

}

function ThemeIconMoon() {
  return (
    <svg className="theme-toggle-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0019 12.79z" />
    </svg>);

}

function ThemeToggle() {
  const [theme, setTheme] = useState(() => {
    try {
      return localStorage.getItem('shan-theme') === 'dark' ? 'dark' : 'light';
    } catch (e) {
      return 'light';
    }
  });

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try {
      localStorage.setItem('shan-theme', theme);
    } catch (e) {}
  }, [theme]);

  return (
    <div className="theme-toggle" role="group" aria-label="Color theme">
      <button
        type="button"
        className={'theme-toggle-btn' + (theme === 'light' ? ' theme-toggle-btn--active' : '')}
        onClick={() => setTheme('light')}
        aria-pressed={theme === 'light'}
        title="Light mode"
      >
        <ThemeIconSun />
      </button>
      <span className="theme-toggle-sep" aria-hidden="true">/</span>
      <button
        type="button"
        className={'theme-toggle-btn' + (theme === 'dark' ? ' theme-toggle-btn--active' : '')}
        onClick={() => setTheme('dark')}
        aria-pressed={theme === 'dark'}
        title="Dark mode"
      >
        <ThemeIconMoon />
      </button>
    </div>);

}

/* ─── App ─── */
function App() {
  const [route, setRoute] = useState(() => routeFromLocation());

  const navigate = useCallback((r) => {
    const next = hrefForRoute(r);
    if (window.location.hash !== next) {
      window.location.hash = next;
    }
    setRoute(r);
    window.scrollTo(0, 0);
  }, []);

  useLayoutEffect(() => {
    window.scrollTo(0, 0);
    document.title = titleForRoute(route);
  }, [route]);

  useLayoutEffect(() => {
    const base = window.location.pathname + window.location.search;
    const h = window.location.hash;
    if (/#\/notes/.test(h)) {
      history.replaceState(null, '', base + '#/about');
    } else if (!h || h === '#') {
      history.replaceState(null, '', base + '#/about');
    }
  }, []);

  useEffect(() => {
    const syncFromUrl = () => {
      setRoute(routeFromLocation());
      window.scrollTo(0, 0);
    };
    window.addEventListener('hashchange', syncFromUrl);
    return () => window.removeEventListener('hashchange', syncFromUrl);
  }, []);

  return (
    <>
      <div className="portfolio-shell">
        <div className="portfolio-inner">
          <SideNav route={route} navigate={navigate} />
          <main
            className="portfolio-main"
            style={{
              position: 'relative',
              zIndex: 1,
              animation: 'fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both'
            }}
          >
            {route === 'about' && <BioSection />}
            {route === 'projects' && <WorkSection />}
          </main>
        </div>
      </div>
      <ThemeToggle />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<script>
(function () {
  function isReload() {
    try {
      const nav = performance.getEntriesByType('navigation')[0];
      if (nav && nav.type === 'reload') return true;
    } catch (e) {}
    try {
      if (typeof performance !== 'undefined' && performance.navigation && performance.navigation.type === 1) return true;
    } catch (e) {}
    return false;
  }
  function scrollTopNoHash() {
    if (window.location.hash) return;
    window.scrollTo(0, 0);
  }
  function afterBrowserRestore() {
    if (!isReload() || window.location.hash) return;
    scrollTopNoHash();
    requestAnimationFrame(function () {
      requestAnimationFrame(scrollTopNoHash);
    });
  }
  window.addEventListener('pageshow', function (e) {
    if (e.persisted) return;
    afterBrowserRestore();
  });
  window.addEventListener('load', function () {
    afterBrowserRestore();
  });
})();
</script>
</body>
