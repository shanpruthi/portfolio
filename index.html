const { useState, useEffect, useRef, useCallback } = React;

/* ─── Scroll-reactive background ─── */
function BackgroundGlow() {
  const ref = useRef(null);
  useEffect(() => {
    let raf;
    let scrollY = window.scrollY;
    let currentY = 0;
    const start = performance.now();
    const onScroll = () => {scrollY = window.scrollY;};
    window.addEventListener('scroll', onScroll, { passive: true });
    const tick = () => {
      currentY += (scrollY - currentY) * 0.05;
      if (ref.current) {
        const pct = Math.min(currentY / Math.max(document.body.scrollHeight - window.innerHeight, 1), 1);
        const t = (performance.now() - start) / 1000;
        // Slow drifting offsets so the orbs breathe even when not scrolling
        const dx1 = Math.sin(t * 0.18) * 8;
        const dy1 = Math.cos(t * 0.15) * 6;
        const dx2 = Math.cos(t * 0.13) * 9;
        const dy2 = Math.sin(t * 0.17) * 7;
        // Orb 1: top-right, warm lavender → shifts left and down
        const x1 = 80 - pct * 35 + dx1;
        const y1 = 10 + pct * 20 + dy1;
        // Orb 2: bottom-left, soft teal → shifts right and up
        const x2 = 20 + pct * 30 + dx2;
        const y2 = 90 - pct * 30 + dy2;
        // Soft lavender (matches selection highlight) — tiny live hue wander for life
        const hue1 = 280 + Math.sin(t * 0.1) * 6;
        const hue2 = 280 + Math.cos(t * 0.09) * 6;
        ref.current.style.background = [
        `radial-gradient(ellipse 65vw 45vh at ${x1}% ${y1}%, oklch(0.91 0.10 ${hue1} / 0.70) 0%, transparent 70%)`,
        `radial-gradient(ellipse 60vw 50vh at ${x2}% ${y2}%, oklch(0.91 0.10 ${hue2} / 0.55) 0%, transparent 70%)`].
        join(', ');
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => {cancelAnimationFrame(raf);window.removeEventListener('scroll', onScroll);};
  }, []);
  return (
    <div ref={ref} style={{
      position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none',
      background: `radial-gradient(ellipse 65vw 45vh at 80% 10%, oklch(0.91 0.10 280 / 0.70) 0%, transparent 70%),
                  radial-gradient(ellipse 60vw 50vh at 20% 90%, oklch(0.91 0.10 280 / 0.55) 0%, transparent 70%)`
    }} />);

}

function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', fn, { passive: true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      height: '56px', padding: '0 48px',
      display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
      borderBottom: scrolled ? '1px solid #e8e6df' : '1px solid transparent',
      background: scrolled ? 'rgba(255,255,255,0.9)' : 'transparent',
      backdropFilter: scrolled ? 'blur(16px)' : 'none',
      transition: 'background 0.3s, border-color 0.3s'
    }}>
      <div style={{ display: 'flex', gap: '28px', alignItems: 'center' }}>
        {[['LinkedIn', 'https://www.linkedin.com/in/shanpruthi/'], ['GitHub', 'https://github.com/shanpruthi'], ['X', 'https://x.com/shanpruthi']].map(([l, h]) =>

        onMouseEnter={(e) => e.target.style.color = '#111'}
        onMouseLeave={(e) => e.target.style.color = '#666'}>{l}</a>
        )}

}
