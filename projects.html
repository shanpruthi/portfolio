<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─── Nav ─── */
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position:'fixed',top:0,left:0,right:0,zIndex:100,
      padding:'0 48px',height:'56px',
      display:'flex',alignItems:'center',justifyContent:'space-between',
      borderBottom: scrolled ? '1px solid #e8e6e0' : '1px solid transparent',
      background: scrolled ? 'rgba(249,248,246,0.92)' : 'transparent',
      backdropFilter: scrolled ? 'blur(12px)' : 'none',
      transition:'all 0.3s ease',
    }}>
      <a href="index.html" style={{
        display:'flex',alignItems:'center',gap:'8px',textDecoration:'none',
      }}>
        <span style={{fontFamily:'Instrument Serif',fontSize:'17px',letterSpacing:'-0.01em',color:'#111'}}>Shan Pruthi</span>
        <span style={{fontSize:'11px',color:'#888',letterSpacing:'0.08em',textTransform:'uppercase',marginLeft:'4px'}}>Product Manager + Builder</span>
      </a>
      <div style={{display:'flex',gap:'32px',alignItems:'center'}}>
        {[['Home','index.html'],['About','index.html#about'],['Contact','index.html#contact']].map(([l,h])=>(
          <a key={l} href={h} style={{fontSize:'13px',color:'#444',textDecoration:'none',letterSpacing:'0.02em'}}
            onMouseEnter={e=>e.target.style.color='#111'}
            onMouseLeave={e=>e.target.style.color='#444'}>
            {l}
          </a>
        ))}
        <a href="projects.html" style={{fontSize:'13px',color:'#111',textDecoration:'none',borderBottom:'1px solid #111',paddingBottom:'1px'}}>Projects</a>
      </div>
    </nav>
  );
}

/* ─── Gradient orb for cards ─── */
function CardOrb({ colors, id }) {
  return (
    <svg width="100%" height="100%" style={{position:'absolute',top:0,left:0}} preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id={`cg1-${id}`} cx="30%" cy="35%" r="55%">
          <stop offset="0%" stopColor={colors[0]} stopOpacity="0.95"/>
          <stop offset="100%" stopColor={colors[0]} stopOpacity="0"/>
        </radialGradient>
        <radialGradient id={`cg2-${id}`} cx="65%" cy="55%" r="55%">
          <stop offset="0%" stopColor={colors[1]} stopOpacity="0.9"/>
          <stop offset="100%" stopColor={colors[1]} stopOpacity="0"/>
        </radialGradient>
        <radialGradient id={`cg3-${id}`} cx="48%" cy="72%" r="50%">
          <stop offset="0%" stopColor={colors[2]} stopOpacity="0.8"/>
          <stop offset="100%" stopColor={colors[2]} stopOpacity="0"/>
        </radialGradient>
        <filter id={`cblur-${id}`}><feGaussianBlur stdDeviation="18"/></filter>
      </defs>
      <g filter={`url(#cblur-${id})`}>
        <ellipse cx="30%" cy="35%" rx="45%" ry="48%" fill={`url(#cg1-${id})`}/>
        <ellipse cx="65%" cy="55%" rx="42%" ry="45%" fill={`url(#cg2-${id})`}/>
        <ellipse cx="48%" cy="72%" rx="38%" ry="42%" fill={`url(#cg3-${id})`}/>
      </g>
    </svg>
  );
}

/* ─── Project detail drawer ─── */
function Drawer({ project, onClose }) {
  useEffect(() => {
    const fn = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', fn);
    document.body.style.overflow = 'hidden';
    return () => {
      window.removeEventListener('keydown', fn);
      document.body.style.overflow = '';
    };
  }, [onClose]);

  if (!project) return null;
  const p = project;

  return (
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{
        position:'fixed',inset:0,background:'rgba(0,0,0,0.3)',zIndex:200,
        backdropFilter:'blur(4px)',
        animation:'fadeIn 0.2s ease',
      }}/>
      {/* Panel */}
      <div style={{
        position:'fixed',top:0,right:0,bottom:0,width:'min(640px,90vw)',
        background:'#f9f8f6',zIndex:201,
        overflowY:'auto',
        boxShadow:'-20px 0 60px rgba(0,0,0,0.1)',
        animation:'slideIn 0.28s cubic-bezier(0.22,1,0.36,1)',
      }}>
        {/* Header orb */}
        <div style={{height:'280px',position:'relative',overflow:'hidden',background:'#f0ede8'}}>
          <CardOrb colors={p.colors} id={`drawer-${p.id}`}/>
          <div style={{
            position:'absolute',bottom:0,left:0,right:0,
            padding:'28px 40px',
            background:'linear-gradient(to top, rgba(249,248,246,0.95) 60%, transparent)',
          }}>
            <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'12px'}}>
              {p.tags.map(t=>(
                <span key={t} style={{
                  fontSize:'11px',letterSpacing:'0.07em',textTransform:'uppercase',
                  color:'#888',padding:'3px 8px',border:'1px solid #d8d5d0',borderRadius:'99px',
                  background:'rgba(249,248,246,0.8)',
                }}>{t}</span>
              ))}
            </div>
            <h2 style={{fontFamily:'Instrument Serif',fontSize:'28px',fontWeight:400,color:'#111',lineHeight:1.2}}>{p.title}</h2>
          </div>
          <button onClick={onClose} style={{
            position:'absolute',top:'20px',right:'20px',
            width:'36px',height:'36px',borderRadius:'50%',
            border:'1px solid rgba(0,0,0,0.12)',background:'rgba(249,248,246,0.9)',
            cursor:'pointer',fontSize:'18px',color:'#555',
            display:'flex',alignItems:'center',justifyContent:'center',
            backdropFilter:'blur(4px)',
          }}>×</button>
        </div>

        {/* Content */}
        <div style={{padding:'40px'}}>
          {/* Meta row */}
          <div style={{
            display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'24px',
            padding:'20px 0',borderTop:'1px solid #e8e6e0',borderBottom:'1px solid #e8e6e0',
            marginBottom:'36px',
          }}>
            {[['Company',p.company],['Year',p.year],['Role',p.role]].map(([k,v])=>(
              <div key={k}>
                <p style={{fontSize:'11px',letterSpacing:'0.08em',textTransform:'uppercase',color:'#aaa',marginBottom:'4px'}}>{k}</p>
                <p style={{fontSize:'14px',color:'#111',fontWeight:500}}>{v}</p>
              </div>
            ))}
          </div>

          {p.sections.map((s, i) => (
            <div key={i} style={{marginBottom:'32px'}}>
              <p style={{fontSize:'11px',letterSpacing:'0.1em',textTransform:'uppercase',color:'#aaa',marginBottom:'10px'}}>{s.label}</p>
              {s.title && <h3 style={{fontFamily:'Instrument Serif',fontSize:'22px',fontWeight:400,color:'#111',marginBottom:'10px',lineHeight:1.3}}>{s.title}</h3>}
              <p style={{fontSize:'15px',color:'#444',lineHeight:1.7}}>{s.body}</p>
              {s.metrics && (
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:'16px',marginTop:'20px'}}>
                  {s.metrics.map(m=>(
                    <div key={m.label} style={{
                      background:'#fff',border:'1px solid #e8e6e0',borderRadius:'12px',
                      padding:'16px',textAlign:'center',
                    }}>
                      <p style={{fontFamily:'Instrument Serif',fontSize:'28px',color:'#111',marginBottom:'4px'}}>{m.value}</p>
                      <p style={{fontSize:'11px',color:'#999',letterSpacing:'0.04em'}}>{m.label}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
      <style>{`
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
      `}</style>
    </>
  );
}

/* ─── Project Card ─── */
function ProjectCard({ project, onOpen, featured }) {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      onClick={() => onOpen(project)}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
      style={{
        background: hovered ? '#f0ede8' : '#fff',
        border: '1px solid #e8e6e0',
        borderRadius: '16px',
        overflow: 'hidden',
        cursor: 'pointer',
        transition: 'transform 0.2s, box-shadow 0.2s, background 0.2s',
        transform: hovered ? 'translateY(-4px)' : 'none',
        boxShadow: hovered ? '0 16px 48px rgba(0,0,0,0.08)' : '0 1px 4px rgba(0,0,0,0.04)',
        gridColumn: featured ? 'span 2' : 'span 1',
        display: 'grid',
        gridTemplateColumns: featured ? '1fr 1fr' : '1fr',
      }}
    >
      <div style={{height: featured ? '100%' : '200px', minHeight: featured ? '240px' : undefined, position:'relative', overflow:'hidden', background:'#f5f4f1'}}>
        <CardOrb colors={project.colors} id={`card-${project.id}`}/>
      </div>
      <div style={{padding:'28px'}}>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'12px'}}>
          {project.tags.map(t=>(
            <span key={t} style={{
              fontSize:'11px',letterSpacing:'0.07em',textTransform:'uppercase',
              color:'#888',padding:'3px 8px',border:'1px solid #e0deda',borderRadius:'99px',
            }}>{t}</span>
          ))}
        </div>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'start',gap:'16px'}}>
          <div>
            <h3 style={{fontFamily:'Instrument Serif',fontSize: featured ? '26px' : '20px',fontWeight:400,color:'#111',marginBottom:'10px',lineHeight:1.25}}>{project.title}</h3>
            <p style={{fontSize:'14px',color:'#777',lineHeight:1.65}}>{project.desc}</p>
          </div>
          <div style={{
            flexShrink:0,width:'32px',height:'32px',borderRadius:'50%',
            border:'1px solid #e0deda',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:'16px',color:'#aaa',
            transform: hovered ? 'rotate(-45deg)' : 'none',
            transition:'transform 0.2s',
          }}>↗</div>
        </div>

/* ─── App ─── */

            fontSize:'13px',color:'#888',textDecoration:'none',marginBottom:'32px',

            ← Back

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</body>
</html>
